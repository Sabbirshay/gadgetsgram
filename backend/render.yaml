services:
  - type: web
    name: gadgetsgram-backend
    runtime: node
    region: singapore  # Closest to Bangladesh
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 15m
      - key: JWT_REFRESH_EXPIRATION
        value: 7d
      - key: DB_TYPE
        value: sqlite
      - key: DB_DATABASE
        value: ./data/gadgets-gram.db
      - key: ADMIN_EMAIL
        value: adminroni@gadgetsgram.com
      - key: ADMIN_PASSWORD
        value: 123@Gram
      - key: API_PREFIX
        value: api/v1
      - key: CORS_ORIGIN
        value: https://gadgetsgram.vercel.app,http://localhost:8080
      - key: THROTTLE_TTL
        value: 60000
      - key: THROTTLE_LIMIT
        value: 100
    disk:
      name: gadgetsgram-data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1
